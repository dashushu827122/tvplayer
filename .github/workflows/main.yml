name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Show files
        run: ls -la

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git unzip wget python3-pip python3-setuptools
          pip install --upgrade pip
          pip install buildozer cython

      - name: Build APK
        run: |
          buildozer android debug 2>&1
          echo "Exit: True"

      - name: Debug APK
        if: always()
        run: |
          find /home/runner -name "*.apk" -type f 2>/dev/null | head -10
          ls -laR bin/ 2>/dev/null || echo "No bin/"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tvplayer-apk
          path: bin/*.apk