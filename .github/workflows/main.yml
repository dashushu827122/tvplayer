name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Show files
        run: ls -la

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential git unzip wget python3-pip >/dev/null 2>&1
          pip install --upgrade pip
          pip install buildozer cython

      - name: Build APK
        run: |
          buildozer android_new debug 2>&1 | tee build.log

      - name: Check output
        if: always()
        run: |
          echo "=== Looking for APK ==="
          find . -name "*.apk" -type f 2>/dev/null
          ls -la bin/ 2>/dev/null || echo "No bin/"

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tvplayer-apk
          path: bin/*.apk
